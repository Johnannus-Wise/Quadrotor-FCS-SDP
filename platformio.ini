; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = COM4
monitor_speed = 115200
board_build.partitions = default.csv

build_flags = 
    -Os ; Optimization level 2 (faster than -Os)
    -ffast-math                  ; Faster float math (safe for control loops)
    -D PIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK22y  ; Use newer SDK if available
    -mlongcalls

; Release build configuration
build_type = release
board_build.f_cpu = 240000000
; Optimize flash settings for speed
board_build.flash_mode = qio
board_build.f_flash = 80000000L  ; 80MHz flash speed

